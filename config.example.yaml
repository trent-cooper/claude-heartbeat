# claude-heartbeat configuration
# Copy to ~/.claude-heartbeat/config.yaml

channel:
  type: file
  inbox_dir: "~/.claude-heartbeat/inbox"

tasks:
  morning_briefing:
    schedule: "57 7 * * *"
    message: "[HEARTBEAT:morning_briefing]"
    enabled: true

  evening_checkin:
    schedule: "3 19 * * *"
    message: "[HEARTBEAT:evening_checkin]"
    enabled: true

  weekly_review:
    schedule: "3 18 * * 0"
    message: "[HEARTBEAT:weekly_review]"
    enabled: true
